<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VadaPav Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #1a1610; color: #c4b89a; height: 100vh; display: flex; flex-direction: column; }
    #status { padding: 4px 12px; font-size: 12px; background: #1f1b16; border-bottom: 1px solid #332e26; }
    .panels { display: flex; flex: 1; overflow: hidden; }
    #editor-wrap { flex: 1; }
    #output { flex: 1; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; padding: 10px 14px; background: #1a1610; color: #8a9a6e; border: none; border-left: 1px solid #332e26; white-space: pre-wrap; overflow: auto; }
  </style>
</head>
<body>
  <div id="status">loading...</div>
  <div class="panels">
    <div id="editor-wrap"></div>
    <pre id="output"></pre>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script type="module">
    import { transpile } from './vadapav.mjs';

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

    require(['vs/editor/editor.main'], function () {

      // === Register language ===
      monaco.languages.register({ id: 'vadapav' });
      monaco.languages.setMonarchTokensProvider('vadapav', {
        keywords: ['Bhaiya', 'dikhao', 'Agar', 'toh', 'Nahi', 'Bas', 'Ek', 'plate', 'VadaPav', 'Bill', 'de', 'bhaiya', 'mein', 'daal', 'Jab', 'tak', 'Tikha', 'Feeka', 'Extra', 'mirchi'],
        tokenizer: {
          root: [
            [/"[^"]*"?/, 'string'],
            [/\d+/, 'number'],
            [/[A-Za-z_][\w-]*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
            [/[+\-*\/]/, 'operator'],
            [/\s+/, 'white'],
          ]
        }
      });

      // === Theme ===
      monaco.editor.defineTheme('vadapav-dark', {
        base: 'vs-dark',
        inherit: false,
        rules: [
          { token: '',           foreground: 'C4B89A' },
          { token: 'keyword',    foreground: 'E0A030', fontStyle: 'bold' },
          { token: 'string',     foreground: '8ABB5A' },
          { token: 'number',     foreground: '7EAAC5' },
          { token: 'identifier', foreground: 'C4B89A' },
          { token: 'operator',   foreground: '7A7060' },
          { token: 'comment',    foreground: '555045', fontStyle: 'italic' },
        ],
        colors: {
          'editor.background':                '#1F1B16',
          'editor.foreground':                '#C4B89A',
          'editor.lineHighlightBackground':   '#28231C',
          'editor.selectionBackground':       '#3D3528',
          'editor.inactiveSelectionBackground':'#2E2922',
          'editorCursor.foreground':          '#E0A030',
          'editorLineNumber.foreground':      '#4A4035',
          'editorLineNumber.activeForeground':'#E0A030',
          'editorIndentGuide.background':     '#2A2520',
          'editorWidget.background':          '#252017',
          'editorWidget.border':              '#332E26',
          'editorSuggestWidget.background':   '#252017',
          'editorSuggestWidget.border':       '#332E26',
          'editorSuggestWidget.selectedBackground': '#3D3528',
          'editorOverviewRuler.errorForeground': '#CC4433',
          'editorError.foreground':           '#CC4433',
          'editorWarning.foreground':         '#E0A030',
          'scrollbarSlider.background':       '#332E2680',
          'scrollbarSlider.hoverBackground':  '#4A403580',
          'scrollbarSlider.activeBackground':  '#5A504580',
        }
      });

      // === Completions + Snippets ===
      monaco.languages.registerCompletionItemProvider('vadapav', {
        triggerCharacters: ['B', 'A', 'E', 'J', 'N', 'T', 'F', 'm', 'd'],
        provideCompletionItems: function (model, position) {
          const word = model.getWordUntilPosition(position);
          const range = {
            startLineNumber: position.lineNumber,
            endLineNumber: position.lineNumber,
            startColumn: word.startColumn,
            endColumn: word.endColumn,
          };

          const S = monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet;
          const K = monaco.languages.CompletionItemKind;

          return { suggestions: [
            // Snippets (tab-expandable with cursor stops)
            {
              label: 'Bhaiya dikhao "..."',
              kind: K.Snippet,
              insertText: 'Bhaiya dikhao "${1:yahan likho}"',
              insertTextRules: S,
              detail: 'print karo',
              documentation: 'Bhaiya dikhao "hello" → console.log("hello");',
              range,
            },
            {
              label: 'Agar...toh...Nahi toh...Bas',
              kind: K.Snippet,
              insertText: 'Agar ${1:condition} toh\n  ${2:agar sach}\nNahi toh\n  ${3:agar jhooth}\nBas',
              insertTextRules: S,
              detail: 'if/else',
              documentation: 'if/else block with tab stops',
              range,
            },
            {
              label: 'Agar...toh...Bas',
              kind: K.Snippet,
              insertText: 'Agar ${1:condition} toh\n  ${2:body}\nBas',
              insertTextRules: S,
              detail: 'if (no else)',
              documentation: 'if block without else',
              range,
            },
            {
              label: 'Ek plate VadaPav...Bill de bhaiya',
              kind: K.Snippet,
              insertText: 'Ek plate VadaPav\n  ${1}\nBill de bhaiya',
              insertTextRules: S,
              detail: 'program wrapper',
              documentation: 'wraps your code in main program block',
              range,
            },
            {
              label: 'Jab tak...Bas',
              kind: K.Snippet,
              insertText: 'Jab tak ${1:condition}\n  ${2:body}\nBas',
              insertTextRules: S,
              detail: 'while loop',
              documentation: 'loop jab tak condition true hai',
              range,
            },
            {
              label: 'mein daal',
              kind: K.Snippet,
              insertText: '${1:x} mein daal ${2:value}',
              insertTextRules: S,
              detail: 'variable assign',
              documentation: 'x mein daal 5 → let x = 5;',
              range,
            },
            {
              label: 'Extra mirchi "..."',
              kind: K.Snippet,
              insertText: 'Extra mirchi "${1:kya hua?}"',
              insertTextRules: S,
              detail: 'throw error',
              documentation: 'throw an error with message',
              range,
            },

            // Keywords (plain completion, no tab stops)
            { label: 'Bhaiya',  kind: K.Keyword, insertText: 'Bhaiya',  range },
            { label: 'dikhao',  kind: K.Keyword, insertText: 'dikhao',  range },
            { label: 'Tikha',   kind: K.Keyword, insertText: 'Tikha',   detail: 'true',  range },
            { label: 'Feeka',   kind: K.Keyword, insertText: 'Feeka',   detail: 'false', range },
            { label: 'Agar',    kind: K.Keyword, insertText: 'Agar',    range },
            { label: 'toh',     kind: K.Keyword, insertText: 'toh',     range },
            { label: 'Nahi',    kind: K.Keyword, insertText: 'Nahi',    range },
            { label: 'Bas',     kind: K.Keyword, insertText: 'Bas',     range },
          ]};
        }
      });

      // === Quick Fix ===
      let currentMarkers = [];

      monaco.languages.registerCodeActionProvider('vadapav', {
        provideCodeActions: function (model, range, context) {
          const actions = [];

          for (const marker of context.markers) {
            if (marker.message.includes("'dikhao' bolna tha")) {
              const badWord = model.getValueInRange({
                startLineNumber: marker.startLineNumber,
                startColumn: marker.startColumn,
                endLineNumber: marker.endLineNumber,
                endColumn: marker.endColumn,
              });

              actions.push({
                title: "abe 'dikhao' likhna tha, ye kya likh diya!",
                kind: 'quickfix',
                diagnostics: [marker],
                edit: {
                  edits: [{
                    resource: model.uri,
                    textEdit: {
                      range: {
                        startLineNumber: marker.startLineNumber,
                        startColumn: marker.startColumn,
                        endLineNumber: marker.endLineNumber,
                        endColumn: marker.endColumn,
                      },
                      text: 'dikhao',
                    },
                    versionId: model.getVersionId(),
                  }]
                },
                isPreferred: true,
              });
            }

            if (marker.message.includes("aisa kuch nahi milta")) {
              actions.push({
                title: "abe seedha 'Bhaiya dikhao \"...\"' likh na!",
                kind: 'quickfix',
                diagnostics: [marker],
                edit: {
                  edits: [{
                    resource: model.uri,
                    textEdit: {
                      range: {
                        startLineNumber: marker.startLineNumber,
                        startColumn: 1,
                        endLineNumber: marker.startLineNumber,
                        endColumn: model.getLineMaxColumn(marker.startLineNumber),
                      },
                      text: 'Bhaiya dikhao ""',
                    },
                    versionId: model.getVersionId(),
                  }]
                },
              });
            }

            if (marker.message.includes("hawa dikhau")) {
              const line = model.getLineContent(marker.startLineNumber);
              actions.push({
                title: "abe kuch toh likh \"...\" mein!",
                kind: 'quickfix',
                diagnostics: [marker],
                edit: {
                  edits: [{
                    resource: model.uri,
                    textEdit: {
                      range: {
                        startLineNumber: marker.startLineNumber,
                        startColumn: 1,
                        endLineNumber: marker.startLineNumber,
                        endColumn: model.getLineMaxColumn(marker.startLineNumber),
                      },
                      text: line.trimEnd() + ' ""',
                    },
                    versionId: model.getVersionId(),
                  }]
                },
                isPreferred: true,
              });
            }

            if (marker.message.includes("idhar se khola")) {
              const line = model.getLineContent(marker.startLineNumber);
              actions.push({
                title: 'abe band kar isko! " laga idhar!',
                kind: 'quickfix',
                diagnostics: [marker],
                edit: {
                  edits: [{
                    resource: model.uri,
                    textEdit: {
                      range: {
                        startLineNumber: marker.startLineNumber,
                        startColumn: model.getLineMaxColumn(marker.startLineNumber),
                        endLineNumber: marker.startLineNumber,
                        endColumn: model.getLineMaxColumn(marker.startLineNumber),
                      },
                      text: '"',
                    },
                    versionId: model.getVersionId(),
                  }]
                },
                isPreferred: true,
              });
            }
          }

          return { actions, dispose: () => {} };
        }
      });

      // === Create editor ===
      const editor = monaco.editor.create(document.getElementById('editor-wrap'), {
        value: 'Bhaiya dikhao "namaste duniya!"\nBhaiya dikhao "VadaPav ready hai!"',
        language: 'vadapav',
        theme: 'vadapav-dark',
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
        fontSize: 14,
        lineHeight: 22,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        automaticLayout: true,
        padding: { top: 8 },
        cursorBlinking: 'smooth',
        renderLineHighlight: 'gutter',
        quickSuggestions: true,
        suggestOnTriggerCharacters: true,
      });

      const out = document.getElementById('output');
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'ready';

      function parseError(result) {
        const m = result.match(/^error:(\d+):(\d+):(\d+):(\d+): (.+)$/);
        if (!m) return null;
        return { startLine: +m[1], startCol: +m[2], endLine: +m[3], endCol: +m[4], message: m[5] };
      }

      function run() {
        const lines = editor.getValue().split('\n');
        const markers = [];
        const jsLines = [];

        for (let i = 0; i < lines.length; i++) {
          const trimmed = lines[i].trim();
          if (!trimmed) continue;
          const result = transpile(trimmed);
          const err = parseError(result);
          if (err) {
            markers.push({
              startLineNumber: i + 1, startColumn: err.startCol,
              endLineNumber: i + 1, endColumn: err.endCol,
              message: err.message,
              severity: monaco.MarkerSeverity.Error,
            });
          } else {
            jsLines.push(result);
          }
        }

        monaco.editor.setModelMarkers(editor.getModel(), 'vadapav', markers);

        const js = jsLines.join('\n');
        let display = '';
        if (markers.length) {
          display += markers.map(m => 'line ' + m.startLineNumber + ': ' + m.message).join('\n') + '\n\n';
        }
        if (js) {
          display += '// --- JS ---\n' + js + '\n\n';
          try {
            const logs = [];
            new Function('console', js)({ log: (...a) => logs.push(a.join(' ')) });
            display += '// --- output ---\n' + logs.join('\n');
          } catch (e) {
            display += '// --- runtime error ---\n' + e.message;
          }
        }
        out.textContent = display;

        statusEl.textContent = markers.length ? markers.length + ' error' + (markers.length > 1 ? 's' : '') : 'sab badhiya!';
        statusEl.style.color = markers.length ? '#CC4433' : '#8ABB5A';
      }

      let timer;
      editor.onDidChangeModelContent(() => { clearTimeout(timer); timer = setTimeout(run, 200); });
      run();
    });
  </script>
</body>
</html>
